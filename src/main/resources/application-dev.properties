# ===================================================================
# SOURCE DE DONNEES SECURISEE (VIA VARIABLES D'ENVIRONNEMENT)
# ===================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tnb_switch_prod}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions optimisķ pour la production (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ===================================================================
# CONFIGURATION JPA / HIBERNATE SECURE
# ===================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===================================================================
# SECURITE WEBSOCKETS RESTREINTE
# ===================================================================
# Pas encore de domaine : ouvert temporairement, Ó restreindre dĶs qu'un domaine/HTTPS est en place
tnb.websocket.allowed-origins=*

# ===================================================================
# LOGS ALLEGES (POUR PRESERVER L'ESPACE DISQUE)
# ===================================================================
logging.level.root=WARN
logging.level.com.tnb=INFO

# Ecriture des logs sur disque pour profiter du volume montķ dans docker-compose
logging.file.name=/app/logs/tnb-switch.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30