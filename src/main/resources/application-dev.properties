# ===================================================================
# SOURCE DE DONNEES (POSTGRESQL LOCAL / DOCKER)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/tnb_switch_dev
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURATION JPA / HIBERNATE
# ===================================================================
# Génère ou met à jour automatiquement les tables selon nos entités Java
spring.jpa.hibernate.ddl-auto=update
# Affiche les requêtes SQL dans la console pour voir le comportement du Load Balancer
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===================================================================
# SECURITE WEBSOCKETS (OUVERTE POUR LES TESTS)
# ===================================================================
# Permet de connecter vos outils de test (ex: Postman ou clients locaux) sans blocage CORS
tnb.websocket.allowed-origins=*

# ===================================================================
# LOGS & DIAGNOSTICS
# ===================================================================
logging.level.org.springframework.web.socket=DEBUG
logging.level.com.tnb=DEBUG
logging.level.org.hibernate.SQL=DEBUG