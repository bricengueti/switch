# ===================================================================
# GENERAL CONFIGURATION
# ===================================================================
spring.application.name=TnbSwitch-Backend
server.port=8090

# Active profile declared via environment variable (defaults to 'local')
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Encoding configuration to avoid issues with accented characters in SMS
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# JSON configuration (clean ISO-8601 date formatting for the REST API)
spring.jackson.serialization.write-dates-as-timestamps=false