# ===================================================================
# SECURE DATA SOURCE (VIA ENVIRONMENT VARIABLES)
# ===================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tnb_switch_prod}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool optimized for production (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ===================================================================
# JPA / HIBERNATE CONFIGURATION - SECURE
# ===================================================================
# In production, Hibernate must never be allowed to alter the schema.
# Spring only validates schema conformity at startup.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===================================================================
# RESTRICTED WEBSOCKET SECURITY
# ===================================================================
# No domain yet: temporarily open, restrict once a domain/HTTPS is in place
tnb.websocket.allowed-origins=*

# ===================================================================
# LIGHTWEIGHT LOGGING (TO PRESERVE DISK SPACE)
# ===================================================================
logging.level.root=WARN
logging.level.com.tnb=INFO

# Write logs to disk to use the volume mounted in docker-compose
logging.file.name=/app/logs/tnb-switch.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30