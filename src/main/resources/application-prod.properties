# ===================================================================
# SOURCE DE DONNEES SECURISEE (VIA VARIABLES D'ENVIRONNEMENT)
# ===================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tnb_switch_prod}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions optimisé pour la production (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ===================================================================
# CONFIGURATION JPA / HIBERNATE SECURE
# ===================================================================
# En production, interdiction absolue de laisser Hibernate modifier la table.
# Spring vérifie simplement la conformité au démarrage.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===================================================================
# SECURITE WEBSOCKETS RESTREINTE
# ===================================================================
# Remplacez par les vrais noms de domaine de vos clients Web/Admin en production
tnb.websocket.allowed-origins=https://tnbswitch.com,https://admin.tnbswitch.com

# ===================================================================
# LOGS ASSAGIS (POUR PRESÉREVER L'ESPACE DISQUE)
# ===================================================================
logging.level.root=WARN
logging.level.com.tnb=INFO