name: CI/CD Pipeline - TnbSwitch Backend

on:
  push:
    branches:
      - main # Déclenche le pipeline dès que tu pousses sur la branche main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Utilise dynamiquement ton pseudo Docker Hub configuré dans les secrets
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tnb-switch-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Attend que l'image soit bien envoyée sur Docker Hub avant de lancer le déploiement
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Copie du docker-compose.yml sur le serveur
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/tnb-switch/"

      - name: Déploiement automatique sur le Serveur via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Créer le dossier s'il n'existe pas encore sur le serveur
            mkdir -p /home/ubuntu/tnb-switch

            # Se déplacer dans le dossier de déploiement
            cd /home/ubuntu/tnb-switch

            # Génère le .env à chaque déploiement à partir des secrets GitHub (jamais commité sur Git)
            cat > .env <<EOF
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF
            chmod 600 .env

            # Récupérer la dernière image mise à jour depuis Docker Hub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tnb-switch-backend:latest

            # Relancer ton conteneur Docker Compose en appliquant les changements
            SPRING_PROFILES_ACTIVE=prod docker compose up -d --remove-orphans

            # Nettoyer l'espace disque en supprimant les anciennes images obsolètes
            docker image prune -f

      - name: Vérification du déploiement (healthcheck)
        run: |
          sleep 15
          curl -f http://${{ secrets.SSH_HOST }}:8090/actuator/health || exit 1